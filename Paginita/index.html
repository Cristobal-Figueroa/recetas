<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RecipeHub - Find delicious recipes from around the world with our easy-to-use recipe finder">
    <meta name="keywords" content="recipes, cooking, food, meal ideas, cuisine">
    <title>RecipeHub - Simple Recipe Finder</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="container">
                <a href="#" class="logo">RecipeHub</a>
                
                <form class="search-form" id="searchForm">
                    <input
                        type="text"
                        class="search-input"
                        id="searchInput"
                        placeholder="Search recipes..."
                        aria-label="Search recipes"
                    >
                    <button type="submit" class="search-btn" aria-label="Search">
                        🔍
                    </button>
                </form>

                <a href="#favorites" class="favorites-link" aria-label="View favorites">
                    ⭐ Favorites
                </a>
                
                <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
                    🌙
                </button>
            </div>
        </div>

        <nav class="nav">
            <div class="container">
                <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">
                    ☰
                </button>
                <div class="nav-links" id="navLinks">
                    <a href="#" class="nav-link" data-page="home">Home</a>
                    <a href="#categories" class="nav-link" data-page="categories">Categories</a>
                    <a href="#favorites" class="nav-link" data-page="favorites">My Favorites</a>
                    <a href="#cocktails" class="nav-link" data-page="cocktails">🍹 Cocktails</a>
                    <button class="surprise-btn" id="surpriseBtn">
                        🎲 Surprise Me!
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <div class="filter-bar" id="filterBar">
            <div class="filter-container">
                <div class="filter-group">
                    <label for="categoryFilter">Category</label>
                    <select id="categoryFilter" class="filter-select" aria-label="Filter by category">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="areaFilter">Cuisine</label>
                    <select id="areaFilter" class="filter-select" aria-label="Filter by cuisine">
                        <option value="">All Cuisines</option>
                    </select>
                </div>

                <button class="clear-filters-btn" id="clearFilters" style="display: none;">
                    Clear Filters
                </button>
            </div>
        </div>

        <div id="pageContent">
            <h1 class="page-title" id="pageTitle">Discover Recipes</h1>
            <div class="recipe-grid" id="recipeGrid">
                <!-- Recipes will be loaded here -->
            </div>
            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading recipes...</p>
            </div>
            <div class="no-results" id="noResults" style="display: none;">
                <p>No recipes found. Try a different search or filter.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>RecipeHub - Your Simple Recipe Finder</p>
        <p>Data provided by TheMealDB API</p>
    </footer>

    <!-- Recipe Detail Modal -->
    <div class="modal" id="recipeModal" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Close modal">✕</button>
            <div class="modal-body" id="modalBody">
                <!-- Recipe details will be loaded here -->
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
